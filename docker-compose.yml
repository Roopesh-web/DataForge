services:
  postgres:
    image: postgres:16-alpine
    container_name: dataforge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dataforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dataforge}
      POSTGRES_DB: ${POSTGRES_DB:-dataforge}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dataforge} -d ${POSTGRES_DB:-dataforge}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - dataforge-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: dataforge-backend
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-DataForge}
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: ${POSTGRES_USER:-dataforge}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-dataforge}
      DATABASE_NAME: ${POSTGRES_DB:-dataforge}
      UPLOAD_DIR: uploads
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-100}
      CORS_ORIGINS: ${CORS_ORIGINS:-'["http://localhost:8501","http://localhost:8000"]'}
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - dataforge-network

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: dataforge-dashboard
    restart: unless-stopped
    environment:
      DATAFORGE_API_URL: http://backend:8000
      DATAFORGE_API_TIMEOUT: ${DATAFORGE_API_TIMEOUT:-120}
    ports:
      - "${DASHBOARD_PORT:-8501}:8501"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - dataforge-network

volumes:
  postgres_data:
    name: dataforge_postgres_data
  uploads_data:
    name: dataforge_uploads_data
  logs_data:
    name: dataforge_logs_data

networks:
  dataforge-network:
    name: dataforge-network
    driver: bridge
